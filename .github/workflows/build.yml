name: Build HiBy R1 Rockbox

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git xz-utils bzip2 gzip patch texinfo \
            automake libtool autoconf flex bison gawk \
            libgmp-dev libmpfr-dev libmpc-dev libisl-dev \
            rsync ca-certificates

      - name: Cache toolchain/downloads
        uses: actions/cache@v4
        with:
          path: |
            toolchain
            work/rbdev-download
          key: ${{ runner.os }}-rockboxdev-mipsel-v1

      - name: Build firmware + bootloader
        run: ./scripts/build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hiby-r1-${{ github.sha }}
          path: out/*
