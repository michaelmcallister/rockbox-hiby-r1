name: Build HiBy R1 Rockbox

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      GNU_MIRROR: https://ftp.gnu.org/gnu
      LINUX_MIRROR: https://cdn.kernel.org/pub/linux
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      R1_UPDATE_URL: https://drive.usercontent.google.com/download?id=1cvZdQeJsb2qYu2qv6sZaYJaP8vqW1LqG&export=download
      R1_UPDATE_SHA256: 9aada81995d8d2b2ed80d6cf292c62bc5f0f705e51e4f69c7e766ee67536ba60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git xz-utils bzip2 gzip patch texinfo \
            automake libtool libtool-bin autoconf flex bison gawk \
            gtk-doc-tools pkg-config gettext ccache \
            libgmp-dev libmpfr-dev libmpc-dev libisl-dev \
            rsync ca-certificates curl wget \
            p7zip-full squashfs-tools genisoimage

      - name: Cache toolchain/downloads
        uses: actions/cache@v4
        with:
          path: |
            toolchain
            work/rbdev-download
          key: ${{ runner.os }}-rockboxdev-mipsel-v1

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-hibyr1-ccache-v1-${{ github.ref_name }}-${{ hashFiles('patches/*.patch', 'scripts/build.sh') }}
          restore-keys: |
            ${{ runner.os }}-hibyr1-ccache-v1-${{ github.ref_name }}-
            ${{ runner.os }}-hibyr1-ccache-v1-

      - name: Build firmware + bootloader
        id: build
        shell: bash
        run: |
          set -o pipefail
          ./scripts/build.sh 2>&1 | tee build-ci.log

      - name: Publish failure tail
        if: failure()
        shell: bash
        run: |
          {
            echo "== build-ci.log (tail) =="
            test -f build-ci.log && tail -n 80 build-ci.log || true
            echo
            for f in work/rbdev-build/*.log; do
              [ -f "$f" ] || continue
              echo "== ${f} (tail) =="
              tail -n 80 "$f" || true
              echo
            done
          } > failure-summary.txt

          {
            echo '### Failure tail'
            echo
            echo '```text'
            cat failure-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          summary="$(
            sed -e 's/%/%25/g' -e 's/\r/%0D/g' -e ':a;N;$!ba;s/\n/%0A/g' \
              failure-summary.txt
          )"
          echo "::error title=Build failure tail::$summary"

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hiby-r1-${{ github.sha }}
          path: out/*

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hiby-r1-logs-${{ github.sha }}
          path: |
            build-ci.log
            work/rbdev-build/*.log
            work/build-hibyr1-rockbox/config.log
            work/build-hibyr1-bootloader/config.log
          if-no-files-found: ignore
