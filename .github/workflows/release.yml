name: Release HiBy R1 Rockbox

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    env:
      GNU_MIRROR: https://ftp.gnu.org/gnu
      LINUX_MIRROR: https://cdn.kernel.org/pub/linux
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      R1_UPDATE_URL: https://drive.usercontent.google.com/download?id=1cvZdQeJsb2qYu2qv6sZaYJaP8vqW1LqG&export=download
      R1_UPDATE_SHA256: 9aada81995d8d2b2ed80d6cf292c62bc5f0f705e51e4f69c7e766ee67536ba60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git xz-utils bzip2 gzip patch texinfo \
            automake libtool libtool-bin autoconf flex bison gawk \
            gtk-doc-tools pkg-config gettext ccache \
            libgmp-dev libmpfr-dev libmpc-dev libisl-dev \
            rsync ca-certificates curl wget \
            p7zip-full squashfs-tools genisoimage

      - name: Cache toolchain/downloads
        uses: actions/cache@v4
        with:
          path: |
            toolchain
            work/rbdev-download
          key: ${{ runner.os }}-rockboxdev-mipsel-v1

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-hibyr1-ccache-v1-${{ github.ref_name }}-${{ hashFiles('patches/*.patch', 'scripts/build.sh') }}
          restore-keys: |
            ${{ runner.os }}-hibyr1-ccache-v1-${{ github.ref_name }}-
            ${{ runner.os }}-hibyr1-ccache-v1-

      - name: Build firmware + bootloader
        shell: bash
        run: |
          set -o pipefail
          ./scripts/build.sh 2>&1 | tee build-release.log

      - name: Publish failure tail
        if: failure()
        shell: bash
        run: |
          {
            echo "== build-release.log (tail) =="
            test -f build-release.log && tail -n 80 build-release.log || true
            echo
            for f in work/rbdev-build/*.log; do
              [ -f "$f" ] || continue
              echo "== ${f} (tail) =="
              tail -n 80 "$f" || true
              echo
            done
          } > failure-summary.txt

          {
            echo '### Failure tail'
            echo
            echo '```text'
            cat failure-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          assets=(
            out/rockbox.r1
            out/bootloader.r1
            out/r1_rb.upt
            out/rockbox-info.txt
            out/build-metadata.txt
            out/SHA256SUMS
          )

          notes_file="$(mktemp)"
          {
            echo "Automated release for \`$GITHUB_REF_NAME\`."
            echo
            echo 'Artifacts:'
            echo '- `rockbox.r1`'
            echo '- `bootloader.r1`'
            echo '- `r1_rb.upt`'
            echo '- `rockbox-info.txt`'
            echo '- `build-metadata.txt`'
            echo '- `SHA256SUMS`'
          } > "$notes_file"

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file "$notes_file"
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --title "$GITHUB_REF_NAME" \
              --notes-file "$notes_file"
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hiby-r1-release-logs-${{ github.sha }}
          path: |
            build-release.log
            work/rbdev-build/*.log
            work/build-hibyr1-rockbox/config.log
            work/build-hibyr1-bootloader/config.log
          if-no-files-found: ignore
